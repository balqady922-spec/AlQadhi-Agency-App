name: Android Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle 8.4
        run: |
          # تنزيل وتهيئة Gradle 8.4 يدوياً لتجاوز النسخة الافتراضية
          curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle-8.4.zip
          unzip -q gradle-8.4.zip
          export GRADLE_HOME=$PWD/gradle-8.4
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle -v
          gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
